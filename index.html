<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Schapentracker — Minimal</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="wrap">
    <div class="top-bar">
      <h1>Schapentracker</h1>
      <div class="action-row">
        <button id="download-data-btn" type="button" class="section-button">Opslaan</button>
        <button id="upload-data-btn" type="button" class="section-button">Upload</button>
        <button id="clear-data-btn" type="button" class="section-button">Wissen</button>
      </div>
      <input id="upload-data-input" type="file" accept="application/json" style="display:none">
    </div>

    <section>
      <div class="section-header">
        <h2>Weides</h2>
      </div>
      <div id="paddock-list"></div>
    </section>
    
    <section>
      <div class="section-header">
        <h2>Schapen</h2>
      </div>
      <div id="sheep-list" class="sheep-grid"></div>
    </section>

    <section>
      <div class="section-header">
        <h2>Historiek</h2>
      </div>
      <div id="history-list" class="history-list"></div>
    </section>

  </main>

  <div id="paddock-modal" class="modal hidden" aria-hidden="true">
    <div id="paddock-modal-backdrop" class="modal-backdrop"></div>
    <div class="modal-panel">
      <button type="button" id="paddock-modal-close" class="modal-close">×</button>
      <h2>Weide toevoegen</h2>
      <form id="paddock-modal-form" class="group-form">
        <input id="paddock-modal-name" placeholder="Naam weide" required>
        <button type="submit">Toevoegen</button>
      </form>
    </div>
  </div>

  <div id="sheep-modal" class="modal hidden" aria-hidden="true">
    <div id="sheep-modal-backdrop" class="modal-backdrop"></div>
    <div class="modal-panel">
      <button type="button" id="sheep-modal-close" class="modal-close">×</button>
      <h2>Schaap toevoegen</h2>
      <form id="sheep-modal-form" class="group-form">
        <input id="sheep-modal-tag" placeholder="Tag" required>
        <select id="sheep-paddock-modal"></select>
        <select id="sheep-zone-modal" disabled>
          <option value="">Kies eerst een weide</option>
        </select>
        <button type="submit">Toevoegen</button>
      </form>
    </div>
  </div>

  <div id="sheep-tag-edit-modal" class="modal hidden" aria-hidden="true">
    <div id="sheep-tag-edit-modal-backdrop" class="modal-backdrop"></div>
    <div class="modal-panel">
      <button type="button" id="sheep-tag-edit-modal-close" class="modal-close">×</button>
      <h2>Schaapnaam wijzigen</h2>
      <form id="sheep-tag-edit-form" class="group-form">
        <input id="sheep-tag-edit-input" placeholder="Nieuwe naam" required>
        <button type="submit">Opslaan</button>
      </form>
    </div>
  </div>

  <div id="zone-modal" class="modal hidden" aria-hidden="true">
    <div id="zone-modal-backdrop" class="modal-backdrop"></div>
    <div class="modal-panel">
      <button type="button" id="zone-modal-close" class="modal-close">×</button>
      <h2>Zone toevoegen</h2>
      <div class="modal-field">
        <label>Weide</label>
        <div id="zone-modal-paddock-name"></div>
      </div>
      <form id="zone-modal-form" class="group-form">
        <input id="zone-modal-name" placeholder="Zone naam" required>
        <button type="submit">Toevoegen</button>
      </form>
    </div>
  </div>

  <div id="move-modal" class="modal hidden" aria-hidden="true">
    <div id="move-modal-backdrop" class="modal-backdrop"></div>
    <div class="modal-panel">
      <button type="button" id="move-modal-close" class="modal-close">×</button>
      <h2>Verplaats schaap</h2>
      <div class="modal-field">
        <label>Schaap</label>
        <div id="move-modal-sheep-name"></div>
      </div>
      <form id="move-modal-form" class="group-form">
        <select id="move-paddock-modal"></select>
        <select id="move-zone-modal" disabled>
          <option value="">Kies eerst een weide</option>
        </select>
        <button type="submit" id="move-modal-submit" disabled>Verplaats</button>
      </form>
    </div>
  </div>

  <div id="zone-bulk-move-modal" class="modal hidden" aria-hidden="true">
    <div id="zone-bulk-move-modal-backdrop" class="modal-backdrop"></div>
    <div class="modal-panel">
      <button type="button" id="zone-bulk-move-modal-close" class="modal-close">×</button>
      <h2>Verplaats alle dieren</h2>
      <div class="modal-field">
        <label>Bronzone</label>
        <div id="zone-bulk-move-source-name"></div>
      </div>
      <div class="modal-field">
        <label>Aantal schapen</label>
        <div id="zone-bulk-move-sheep-count"></div>
      </div>
      <form id="zone-bulk-move-form" class="group-form">
        <select id="zone-bulk-move-target-paddock-modal"></select>
        <select id="zone-bulk-move-target-zone-modal" disabled>
          <option value="">Kies eerst een weide</option>
        </select>
        <button type="submit" id="zone-bulk-move-submit" disabled>Verplaats alle dieren</button>
      </form>
    </div>
  </div>

  <div id="zone-delete-move-modal" class="modal hidden" aria-hidden="true">
    <div id="zone-delete-move-modal-backdrop" class="modal-backdrop"></div>
    <div class="modal-panel">
      <button type="button" id="zone-delete-move-modal-close" class="modal-close">×</button>
      <h2>Zone verwijderen en schapen verplaatsen</h2>
      <div class="modal-field">
        <label>Te verwijderen zone</label>
        <div id="zone-delete-source-name"></div>
      </div>
      <div class="modal-field">
        <label>Aantal schapen</label>
        <div id="zone-delete-sheep-count"></div>
      </div>
      <form id="zone-delete-move-form" class="group-form">
        <select id="zone-delete-target-paddock-modal"></select>
        <select id="zone-delete-target-zone-modal" disabled>
          <option value="">Kies eerst een weide</option>
        </select>
        <button type="submit" id="zone-delete-move-submit" disabled>Verplaats en verwijder</button>
      </form>
    </div>
  </div>

  <div id="paddock-delete-move-modal" class="modal hidden" aria-hidden="true">
    <div id="paddock-delete-move-modal-backdrop" class="modal-backdrop"></div>
    <div class="modal-panel">
      <button type="button" id="paddock-delete-move-modal-close" class="modal-close">×</button>
      <h2>Weide verwijderen en schapen verplaatsen</h2>
      <div class="modal-field">
        <label>Te verwijderen weide</label>
        <div id="paddock-delete-source-name"></div>
      </div>
      <div class="modal-field">
        <label>Aantal schapen</label>
        <div id="paddock-delete-sheep-count"></div>
      </div>
      <form id="paddock-delete-move-form" class="group-form">
        <select id="paddock-delete-target-paddock-modal"></select>
        <select id="paddock-delete-target-zone-modal" disabled>
          <option value="">Kies eerst een weide</option>
        </select>
        <button type="submit" id="paddock-delete-move-submit" disabled>Verplaats en verwijder</button>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
